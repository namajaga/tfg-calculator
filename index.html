<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>TFC Forging Calculator</title>
        <style>
            body {
                font-family: sans-serif;
                user-select: none;
            }
            .container {
                margin: 20px;
            }

            .input-number {
                width: 40px;
            }

            .tiles {
                display: flex;
                gap: 8px;
                flex-wrap: wrap;
                margin: 10px 0;
            }
            .tiles::after {
                content: "";
                height: 20px;
                padding: 10px 10px;
            }

            .tile {
                width: 20px;
                height: 20px;
                padding: 10px 10px;
                border-radius: 6px;
                color: white;
                font-weight: bold;
                cursor: pointer;
            }
            .output-tile {
                height: 20px;
                padding: 10px 10px;
                border-radius: 6px;
                color: white;
                font-weight: bold;
            }
            .output {
                margin-top: 20px;
                font-size: 18px;
            }

            .cyan {
                background: cyan;
                color: black;
            }
            .lightblue {
                background: #87cefa;
            }
            .navy {
                background: navy;
            }
            .purple {
                background: purple;
            }
            .lime {
                background: lime;
                color: black;
            }
            .yellow {
                background: yellow;
                color: black;
            }
            .orange {
                background: orange;
            }
            .red {
                background: red;
            }

            h1,
            h2,
            h3,
            h4 {
                margin: 0;
            }

            .in-div-img {
                width: 100%;
                margin-top: 10px;
            }

            .container-box {
                padding: 10px;
                margin-top: 10px;
                background-color: #ccc;

                border-radius: 5px;
            }

            #restriction {
                /* height: 60px; */
            }

            .initial-val-icon {
                color: green;
            }

            .target-val-icon {
                color: red;
            }
        </style>

        <style>
            .recipe-tile {
                height: 20px;
                padding: 10px 10px;
                border-radius: 6px;
                color: white;
                background-color: #777;
                font-weight: bold;
                cursor: pointer;
            }

            .tile-text {
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
            }
            .tile-img-wrapper {
                width: 40px;
                height: 40px;
            }
            .tile-img {
                margin: 0;
                padding: 0;

                width: 63px;
                height: 63px;
                overflow: hidden;
                position: relative;

                transform: scale(0.63492);
                transform-origin: top left;
            }
            .tile-img img {
                position: absolute;
                left: -320px;
                top: -36px;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="container-box">
                <h2>TFC Forging Calculator</h2>
                <img class="in-div-img" src="./files/forging-gui-mark.jpg" alt="" />
            </div>

            <div class="container-box">
                <h3>登録済みレシピ一覧</h3>

                <div style="margin-left: 30px">
                    <li>下記から素材・クラフト対象を選択することで目標値・制限を自動入力できます。</li>
                    <li>アイコン暗い場合も、制限は自動入力されます。目標値を手動で入力してください。</li>
                    <li>素材・クラフト対象がない場合は、目標値・制限を手動で入力してください。</li>
                </div>
                <br>

                <h4>素材</h4>
                <div id="materialTiles" class="tiles"></div>

                <h4>クラフト対象</h4>
                <div id="typeTiles" class="tiles"></div>
            </div>

            <div class="input-box container-box">
                <h3>① 目標値を入力</h3>
                <div>
                    <span class="initial-val-icon">▲</span>
                    <label>初期値: </label>
                    <input type="number" id="initial" class="input-number" value="0" />
                </div>
                <div>
                    <span class="target-val-icon">▼</span>
                    <label>目標値: </label>
                    <input type="number" id="target" class="input-number" value="48" />
                </div>
            </div>
            <div class="input-box container-box">
                <h3>② 制限を入力</h3>
                <div id="palette" class="tiles"></div>

                <h4>最後 → 最後から2番目 → 最後から3番目</h4>
                <div id="restriction" class="tiles"></div>
            </div>

            <!-- <button onclick="solve()">計算</button> -->

            <div class="output-box container-box">
                <h3>結果</h3>
                <div class="output" id="result"></div>
            </div>
        </div>

        <script>
            // ------------------- レシピのロード --------------------
            let recipeData = null;

            const materialSelect = document.getElementById("materialSelect");
            const typeSelect = document.getElementById("typeSelect");

            const materialCustom = document.getElementById("materialCustom");
            const typeCustom = document.getElementById("typeCustom");

            loadDefinitions();

            async function loadDefinitions() {
                const res = await fetch("./files/forge-recipes.json");
                recipeData = await res.json();

                initMaterialTiles();
            }

            function initMaterialTiles() {
                materialTiles.innerHTML = "";

                Object.entries(recipeData.materials).forEach(([material, data]) => {
                    const tile = document.createElement("div");

                    tile.className = "recipe-tile tile-text";

                    const color = data.color || "#666";

                    tile.style.background = color;

                    // tile.textContent = material.substring(0,3);
                    tile.textContent = material;

                    tile.title = material;

                    tile.onclick = () => selectMaterial(material, tile);

                    materialTiles.appendChild(tile);
                });
            }
            let selectedMaterial = null;

            function selectMaterial(material, tile) {
                selectedMaterial = material;

                [...materialTiles.children].forEach((t) => (t.style.outline = ""));

                tile.style.outline = "3px solid black";

                updateTypeTiles();
            }

            function updateTypeTiles() {
                typeTiles.innerHTML = "";

                const materialTypes = recipeData.materials[selectedMaterial].types || {};
                const allTypes = recipeData.types; // ← 全Type定義

                Object.keys(allTypes).forEach((type) => {
                    const hasTarget = materialTypes[type] !== undefined;

                    const tileWrapper = document.createElement("div");
                    tileWrapper.className = "tile-img-wrapper";

                    const tile = document.createElement("div");
                    tile.className = "recipe-tile tile-text tile-img";

                    tile.title = type;

                    // 未定義なら暗く
                    if (!hasTarget) {
                        tile.style.filter = "brightness(0.5)";
                    }

                    const iconPath = "./files/type_icons/" + type + ".png";

                    const img = document.createElement("img");
                    img.src = iconPath;

                    img.onerror = () => {
                        tile.textContent = type;
                    };

                    img.onload = () => {
                        tile.appendChild(img);
                    };

                    tile.appendChild(img);

                    tile.onclick = () => selectType(type, tile, hasTarget);

                    tileWrapper.appendChild(tile);
                    typeTiles.appendChild(tileWrapper);
                });
            }
            /* ------------------- Select type ------------------- */

            function selectType(type, tile, hasTarget) {
                [...typeTiles.children].forEach((t) => (t.style.outline = ""));

                tile.parentElement.style.outline = "3px solid black";

                applyRecipe(selectedMaterial, type, hasTarget);
            }

            function applyRecipe(material, type, hasTarget) {
                const restrictions = recipeData.types[type] || [];

                if (hasTarget) {
                    const target = recipeData.materials[material].types[type];
                    document.getElementById("target").value = target;
                } else {
                    // 未定義 → 0
                    document.getElementById("target").value = 0;
                }

                setRestrictions(restrictions);
            }

            function setRestrictions(list) {
                restrictionDiv.innerHTML = "";

                list.forEach((v) => {
                    const tile = createRestrictionTile(v);

                    tile.onclick = () => restrictionDiv.removeChild(tile);

                    restrictionDiv.appendChild(tile);
                });
            }

            /* ---------------------- calc ----------------------- */

            const numbers = [
                { v: -3, cls: "cyan" },
                { v: -6, cls: "lightblue" },
                { v: -9, cls: "navy" },
                { v: -15, cls: "purple" },
                { v: 2, cls: "lime" },
                { v: 7, cls: "yellow" },
                { v: 13, cls: "orange" },
                { v: 16, cls: "red" },
            ];

            const restrictionDiv = document.getElementById("restriction");
            const paletteDiv = document.getElementById("palette");
            const resultDiv = document.getElementById("result");

            initPalette();

            /* ---------------- UI 初期化 ---------------- */

            function initPalette() {
                // 制限タイル選択ボタンの生成
                numbers.forEach((n) => {
                    const t = createRestrictionTile(n.v);

                    // クリックで選択できるように設定
                    t.onclick = () => {
                        if (restrictionDiv.children.length < 3) {
                            const copy = createRestrictionTile(n.v);

                            copy.onclick = () => restrictionDiv.removeChild(copy);

                            restrictionDiv.appendChild(copy);
                        }
                    };

                    paletteDiv.appendChild(t);
                });

                // 計算実行イベント設定
                document.querySelectorAll(".input-box input").forEach((input) => {
                    input.oninput = () => solve();
                });
                let mo = new MutationObserver(() => solve());
                mo.observe(restrictionDiv, { childList: true });
            }

            function createRestrictionTile(v) {
                const n = numbers.find((x) => x.v === v);

                const t = document.createElement("div");
                t.className = "tile " + n.cls;
                t.textContent = v;

                return t;
            }
            function createResultTile(v) {
                const n = numbers.find((x) => x.v === v);

                const t = document.createElement("div");
                t.className = "output-tile " + n.cls;
                t.textContent = v;

                return t;
            }

            /* ---------------- 入力取得 ---------------- */

            function getInput() {
                const target = parseInt(document.getElementById("target").value);

                const restrictions = [...restrictionDiv.children].map((t) =>
                    parseInt(t.textContent),
                );

                return { target, restrictions };
            }

            /* ---------------- 計算ロジック ---------------- */

            function calculateOptimalCombination(target, restrictions) {
                const restrictionSum = restrictions.reduce((a, b) => a + b, 0);
                const remain = target - restrictionSum;

                const vals = numbers.map((n) => n.v);

                const MAX = 400;
                const visited = new Set();
                const queue = [];

                queue.push({ sum: 0, path: [] });
                visited.add(0);

                while (queue.length > 0) {
                    const current = queue.shift();

                    if (current.sum === remain) {
                        return current.path;
                    }

                    for (let v of vals) {
                        const nextSum = current.sum + v;

                        if (nextSum < -MAX || nextSum > MAX) continue;
                        if (visited.has(nextSum)) continue;

                        visited.add(nextSum);

                        queue.push({
                            sum: nextSum,
                            path: [...current.path, v],
                        });
                    }
                }

                return null;
            }

            /* ---------------- 表示更新 ---------------- */

            function renderResult(core, restrictions) {
                resultDiv.innerHTML = "";

                if (!core) {
                    resultDiv.textContent = "解なし";
                    return;
                }

                const counts = {};

                core.forEach((v) => (counts[v] = (counts[v] || 0) + 1));

                const sorted = Object.keys(counts)
                    .map(Number)
                    .sort((a, b) => a - b);

                // 計算結果の手順を表示
                sorted.forEach((v) => {
                    for (let i = 0; i < counts[v]; i++) {
                        resultDiv.appendChild(createResultTile(v));
                    }
                });

                // 末尾に制限を表示
                const sortedRestrictions = restrictions.reverse();
                sortedRestrictions.forEach((v) =>
                    resultDiv.appendChild(createResultTile(v)),
                );
            }

            /* ---------------- 実行 ---------------- */

            function solve() {
                resultDiv.textContent = "探索中...";

                const { target, restrictions } = getInput();

                const core = calculateOptimalCombination(target, restrictions);

                renderResult(core, restrictions);
            }
        </script>
    </body>
</html>

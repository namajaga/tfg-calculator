<!doctype html>
<html>
    <head>
        <meta charset="UTF-8" />
        <title>TFC Forging Calculator</title>

        <link rel="stylesheet" href="index.css" />
    </head>
    <body>
        <div class="container">
            <div class="container-main">
                <div class="container-box">
                    <h2>TFC Forging Calculator</h2>
                    <img class="in-div-img" src="./files/forging-gui-mark.jpg" alt="" />
                </div>

                <div class="container-box">
                    <h3>登録済みレシピ一覧</h3>

                    <div style="margin-left: 30px">
                        <li>
                            下記から素材・クラフト対象を選択することで目標値・制限を自動入力できます。
                        </li>
                        <li>
                            素材・クラフト対象がない場合は、目標値・制限を手動で入力してください。
                        </li>
                        <li>
                            アイコン暗い場合も制限は自動入力できます。目標値を手動で入力してください。
                        </li>
                    </div>
                    <br />

                    <div class="category-box">
                        <h4 class="category-label">素材</h4>
                        <div class="item-type-categories">
                            <div id="materialTiles" class="tiles"></div>
                        </div>
                    </div>

                    <div class="category-box">
                        <h4 class="category-label">クラフト対象</h4>
                        <div id="typeTiles" class="item-type-categories"></div>
                    </div>
                </div>

                <div class="input-box container-box">
                    <h3>① 目標値を入力</h3>
                    <div>
                        <span class="initial-val-icon">▲</span>
                        <label>初期値: </label>
                        <input
                            type="number"
                            id="initial"
                            class="input-number"
                            value="0"
                        />
                    </div>
                    <div>
                        <span class="target-val-icon">▼</span>
                        <label>目標値: </label>
                        <input
                            type="number"
                            id="target"
                            name="target"
                            class="input-number"
                            value="48"
                        />
                    </div>
                </div>
                <div class="input-box container-box">
                    <h3>② 制限を入力</h3>
                    <div id="palette" class="tiles"></div>

                    <h4>最後 → 最後から2番目 → 最後から3番目</h4>
                    <div id="restriction" class="tiles"></div>
                </div>

                <!-- <button onclick="solve()">計算</button> -->
            </div>

            <div class="container-right">
                <div class="output-box container-box">
                    <h3>結果</h3>
                    <div class="output" id="result"></div>
                </div>
            </div>
        </div>

        <script src="index.js"></script>
    </body>
</html>
